<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Own CMP Demo</title>
    <style>
      :root {
        --surface: #f6f7f9;
        --panel: #ffffff;
        --ink: #1d1f24;
        --muted: #667085;
        --border: #d9dee7;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--surface);
        color: var(--ink);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        line-height: 1.45;
      }

      header,
      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        padding: 28px 0 18px;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        color: var(--muted);
      }

      main {
        display: grid;
        grid-template-columns: 1fr 360px;
        gap: 16px;
        padding: 24px 0;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 18px;
      }

      h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      button {
        min-height: 40px;
        padding: 0 14px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        color: #ffffff;
        background: var(--accent);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      pre {
        min-height: 220px;
        max-height: 460px;
        overflow: auto;
        padding: 12px;
        background: #fbfcfd;
        border: 1px solid var(--border);
        border-radius: 6px;
        font-size: 13px;
      }

      @media (max-width: 820px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
    <script>
      window.dataLayer = window.dataLayer || [];
      window.gtag = window.gtag || function(){ window.dataLayer.push(arguments); };
    </script>
  </head>
  <body>
    <header>
      <h1>Demo website</h1>
      <p>This page loads the local Own CMP runtime and shows recent dataLayer entries.</p>
    </header>
    <main>
      <section>
        <h2>Page content</h2>
        <p>The banner should appear for new visitors. After a choice is saved, reload the page to verify the stored consent path.</p>
        <button type="button" onclick="window.OwnCMP && window.OwnCMP.openPreferences()">Open preferences</button>
        <button type="button" onclick="window.OwnCMP && window.OwnCMP.resetConsent()">Reset consent</button>
      </section>
      <section>
        <h2>dataLayer</h2>
        <pre id="dl-output">[]</pre>
      </section>
    </main>
    <script
      src="/cmp/owncmp.js"
      data-site-id="demo-site"
      data-config-url="/api/public/config/demo-site/production"
      defer>
    </script>
    <script>
      setInterval(function () {
        document.getElementById("dl-output").textContent = JSON.stringify(window.dataLayer || [], null, 2);
      }, 500);
    </script>
  </body>
</html>
